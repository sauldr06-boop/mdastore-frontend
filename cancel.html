<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pago cancelado — MDAStore Gaming</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #050508;
      color: #fff;
      font-family: 'Rajdhani', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 20px;
    }
    .card {
      background: #0f0f1a;
      border: 1px solid rgba(255,0,170,0.3);
      border-radius: 16px;
      padding: 48px 40px;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 0 40px rgba(255,0,170,0.1);
    }
    .icon { font-size: 4rem; margin-bottom: 20px; }
    h1 {
      font-family: 'Orbitron', monospace;
      font-size: 1.6rem;
      color: #ff00aa;
      margin-bottom: 16px;
      letter-spacing: 2px;
    }
    p { color: #7878a0; font-size: 1rem; line-height: 1.7; margin-bottom: 32px; }
    a {
      display: inline-block;
      background: linear-gradient(135deg, #00f5ff, #bf00ff);
      color: #050508;
      font-family: 'Orbitron', monospace;
      font-size: 0.7rem;
      font-weight: 900;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-decoration: none;
      padding: 14px 32px;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">❌</div>
    <h1>Pago Cancelado</h1>
    <p>El pago ha sido cancelado.<br/>Puedes volver a la tienda e intentarlo de nuevo.</p>
    <a href="index.html">Volver a la tienda</a>
  </div>
</body>
</html>
